<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — TrailVolt</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0B1626;
      color: #fff;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 900; letter-spacing: -0.03em; margin-bottom: 0.75rem; }
    h1 span { color: #3FFFAB; }
    p { font-size: 1.05rem; color: rgba(255,255,255,0.65); line-height: 1.7; max-width: 420px; margin: 0 auto 2rem; }
    a {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #3FFFAB;
      color: #0B1626;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    a:hover { background: #2AFFA0; }
    a:focus-visible { outline: 3px solid #3FFFAB; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <div class="icon" aria-hidden="true">📡</div>
    <h1>You're <span>Offline</span></h1>
    <p>Looks like you've lost your connection. Check your network and try again — TrailVolt will be here when you're back.</p>
    <a href="/">Try Again</a>
  </main>
</body>
</html>
